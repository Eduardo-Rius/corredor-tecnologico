<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código de Expansión 90 - Entrenamiento</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');

        :root {
            --bg-dark: #030712;
            --blue-glow: #00f0ff;
            --orange-glow: #ff5500;
            --text-main: #ffffff;
            --text-secondary: #9ca3af;
            --glass-bg: rgba(10, 15, 30, 0.4);
            --glass-border: rgba(0, 240, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 85, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.03) 0%, transparent 60%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Typography */
        h1, h2, h3 {
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .gradient-text-blue {
            background: linear-gradient(90deg, #ffffff, var(--blue-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gradient-text-orange {
            background: linear-gradient(90deg, #ffddaa, var(--orange-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.15rem;
            margin-bottom: 20px;
        }

        /* Layout */
        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            text-align: center;
            padding: 60px 0 30px;
        }

        header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2rem;
            color: var(--blue-glow);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Video Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 50px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.4), transparent);
        }

        /* Blocked Video State */
        .video-card.locked-card {
            opacity: 0.5;
            filter: grayscale(80%);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .video-card.locked-card::before {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        .video-card.unlocked-card {
            opacity: 1;
            filter: grayscale(0%);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 240, 255, 0.1);
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .video-header h3 {
            margin: 0;
            font-size: 1.5rem;
            color: #fff;
        }

        /* Status Pills */
        .status-pill {
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .status-locked {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        .status-active {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.4);
            color: var(--blue-glow);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .status-completed {
            background: rgba(0, 255, 100, 0.08);
            border: 1px solid rgba(0, 255, 100, 0.3);
            color: #55ff88;
        }

        /* Video Wrapper */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 16px;
            overflow: hidden;
            background: #050a15;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .video-wrapper iframe, .video-wrapper #player-1, .video-wrapper #player-2, .video-wrapper #player-3 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Locked Overlay */
        .locked-overlay {
            position: absolute;
            inset: 0;
            background: rgba(5, 10, 20, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .locked-overlay .icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            opacity: 0.6;
        }

        .locked-overlay p {
            color: #fff;
            margin: 0;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .glass-card { padding: 25px 20px; }
            .video-header { flex-direction: column; align-items: flex-start; }
            .status-pill { align-self: flex-start; }
        }

        /* Manual Fallback Option */
        .manual-advance-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: underline;
            opacity: 0.6;
            margin-top: 15px;
            display: block;
            text-align: right;
            width: 100%;
            transition: all 0.3s;
        }
        
        .manual-advance-btn:hover {
            color: var(--blue-glow);
            opacity: 1;
        }

        /* --- Botón Futurista Styles --- */
        .cta-container {
            display: none; /* Hidden by default */
            justify-content: center;
            margin: 20px 0 80px;
            padding: 20px;
        }

        .button-wrapper {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .energia-toroidal {
            position: absolute;
            inset: -4px;
            border-radius: 60px;
            z-index: 0;
            overflow: hidden;
            filter: blur(8px);
            opacity: 0.85;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .energia-toroidal::before,
        .energia-toroidal::after {
            content: '';
            position: absolute;
            inset: -100%;
            background: conic-gradient(from 0deg, transparent 0%, #00f0ff 25%, transparent 35%, transparent 50%, #ff5500 75%, transparent 85%, transparent 100%);
            animation: rotar 3s linear infinite;
        }

        .energia-toroidal::after {
            background: conic-gradient(from 180deg, transparent 0%, #ff5500 25%, transparent 35%, transparent 50%, #00f0ff 75%, transparent 85%, transparent 100%);
            animation: rotar 5s linear infinite reverse;
            opacity: 0.7;
            mix-blend-mode: screen;
        }

        .energia-mask {
            position: absolute;
            inset: 2px;
            background: var(--bg-dark);
            border-radius: 50px;
            z-index: 1;
        }

        @keyframes rotar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-futurista {
            position: relative;
            z-index: 2;
            background: rgba(10, 15, 30, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 240, 255, 0.4);
            border-radius: 50px;
            padding: 22px 60px;
            color: #ffffff;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: inset 0px 0px 20px rgba(0, 240, 255, 0.1), inset 0px -4px 10px rgba(255, 85, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }

        .btn-futurista::after {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: skewX(-25deg);
            animation: destello 5s infinite;
        }

        @keyframes destello { 0% { left: -150%; } 15% { left: 200%; } 100% { left: 200%; } }

        .btn-texto {
            position: relative;
            z-index: 3;
            background: linear-gradient(90deg, #ffffff, #e0f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.15);
        }

        .button-wrapper:hover .btn-futurista {
            transform: scale(1.04) translateY(-2px);
            border-color: rgba(255, 100, 0, 0.8);
            background: rgba(15, 20, 40, 0.7);
            box-shadow: inset 0px 0px 20px rgba(255, 100, 0, 0.2), inset 0px -4px 10px rgba(0, 240, 255, 0.2);
        }

        .button-wrapper:hover .energia-toroidal {
            inset: -8px;
            filter: blur(12px);
            opacity: 1;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4), 0 0 30px rgba(255, 100, 0, 0.4);
        }

        /* Floating background decoration */
        .decor-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }
    </style>
    <script>
        // STRICT PROGRESSION GUARD
        if (localStorage.getItem('exp90_visited_pagina_1') !== 'true') {
            window.location.replace('pagina-1.html');
        }
    </script>
</head>
<body>

    <div class="decor-circle" style="top: 20%; left: -10vw; width: 40vw; height: 40vw; background: rgba(0,240,255,0.03);"></div>
    <div class="decor-circle" style="bottom: 10%; right: -10vw; width: 30vw; height: 30vw; background: rgba(255,85,0,0.03);"></div>

    <div class="container">
        
        <header>
            <h1>Ruta de <span class="gradient-text-orange">Asimilación</span></h1>
            <p>Mira los videos en orden para avanzar</p>
        </header>

        <!-- VIDEO 1 -->
        <div class="glass-card video-card unlocked-card" id="video-card-1">
            <div class="video-header">
                <h3><span class="gradient-text-blue">1.</span> La Desconexión</h3>
                <span class="status-pill status-active" id="status-1">▶ En progreso</span>
            </div>
            <div class="video-wrapper">
                <div id="player-1"></div>
            </div>
            <button class="manual-advance-btn" id="manual-btn-1" onclick="manualComplete(1)">He completado el video 1</button>
        </div>

        <!-- VIDEO 2 -->
        <div class="glass-card video-card locked-card" id="video-card-2">
            <div class="video-header">
                <h3><span class="gradient-text-blue">2.</span> El Nuevo Paradigma</h3>
                <span class="status-pill status-locked" id="status-2">🔒 Bloqueado</span>
            </div>
            <div class="video-wrapper">
                <div class="locked-overlay" id="overlay-2">
                    <span class="icon">🔒</span>
                    <p>Completa el Video 1 para desbloquear</p>
                </div>
                <div id="player-2"></div>
            </div>
            <button class="manual-advance-btn" style="display:none;" id="manual-btn-2" onclick="manualComplete(2)">He completado el video 2</button>
        </div>

        <!-- VIDEO 3 -->
        <div class="glass-card video-card locked-card" id="video-card-3">
            <div class="video-header">
                <h3><span class="gradient-text-blue">3.</span> Ejecución Estratégica</h3>
                <span class="status-pill status-locked" id="status-3">🔒 Bloqueado</span>
            </div>
            <div class="video-wrapper">
                <div class="locked-overlay" id="overlay-3">
                    <span class="icon">🔒</span>
                    <p>Completa el Video 2 para desbloquear</p>
                </div>
                <div id="player-3"></div>
            </div>
            <button class="manual-advance-btn" style="display:none;" id="manual-btn-3" onclick="manualComplete(3)">He completado el video 3</button>
        </div>

        <!-- FINAL CTA BUTTON -->
        <div class="cta-container" id="final-btn-container">
            <div class="button-wrapper">
                <div class="energia-toroidal"></div>
                <div class="energia-mask"></div>
                <a href="pagina-3.html" class="btn-futurista">
                    <span class="btn-texto">Evaluación</span>
                </a>
            </div>
        </div>

    </div>

    <!-- YouTube API Logic -->
    <script>
        // Load YouTube IFrame API async
        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // State Tracking
        let player1, player2, player3;
        let v1Done = localStorage.getItem('exp90_vid1') === 'true';
        let v2Done = localStorage.getItem('exp90_vid2') === 'true';
        let v3Done = localStorage.getItem('exp90_vid3') === 'true';

        // Called automatically when YT API is ready
        function onYouTubeIframeAPIReady() {
            // Always initialize Player 1
            player1 = new YT.Player('player-1', {
                videoId: 'xcaXf1S7SFQ',
                playerVars: { 'rel': 0, 'modestbranding': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });

            // Unlock and Init others if already done in previous sessions
            if (v1Done) unlockVideo(2);
            if (v2Done) unlockVideo(3);
        }

        // Handle Video Finish Event
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                if (event.target === player1 && !v1Done) {
                    completeVideo(1);
                } else if (event.target === player2 && !v2Done) {
                    completeVideo(2);
                } else if (event.target === player3 && !v3Done) {
                    completeVideo(3);
                }
            }
        }

        // Logic applied when a video finishes or user clicks manual completion
        function completeVideo(num) {
            if (num === 1) {
                v1Done = true;
                localStorage.setItem('exp90_vid1', 'true');
                unlockVideo(2);
            } else if (num === 2) {
                v2Done = true;
                localStorage.setItem('exp90_vid2', 'true');
                unlockVideo(3);
            } else if (num === 3) {
                v3Done = true;
                localStorage.setItem('exp90_vid3', 'true');
                showFinalButton();
            }
            updateUI();
        }

        // Unlock visually and initialize the YouTube player for that card
        function unlockVideo(num) {
            if (num === 2) {
                // UI changes
                let overlay = document.getElementById('overlay-2');
                if(overlay) overlay.style.display = 'none';
                document.getElementById('video-card-2').classList.remove('locked-card');
                document.getElementById('video-card-2').classList.add('unlocked-card');

                // Init Player if YT exists and hasn't been initialized
                if (typeof YT !== 'undefined' && YT.Player && !player2) {
                    player2 = new YT.Player('player-2', {
                        videoId: 'tNb0HsKlJ_s',
                        playerVars: { 'rel': 0, 'modestbranding': 1 },
                        events: { 'onStateChange': onPlayerStateChange }
                    });
                }
            }
            if (num === 3) {
                let overlay = document.getElementById('overlay-3');
                if(overlay) overlay.style.display = 'none';
                document.getElementById('video-card-3').classList.remove('locked-card');
                document.getElementById('video-card-3').classList.add('unlocked-card');

                if (typeof YT !== 'undefined' && YT.Player && !player3) {
                    player3 = new YT.Player('player-3', {
                        videoId: 'oh00qCqMfLI',
                        playerVars: { 'rel': 0, 'modestbranding': 1 },
                        events: { 'onStateChange': onPlayerStateChange }
                    });
                }
            }
        }

        function showFinalButton() {
            let container = document.getElementById('final-btn-container');
            container.style.display = 'flex';
            
            // Smooth scroll to highlight the button
            setTimeout(() => {
                container.scrollIntoView({behavior: "smooth", block: "center"});
            }, 600);
        }

        // Refresh UI Pills and Manual Buttons based on saved states
        function updateUI() {
            if (v1Done) {
                document.getElementById('status-1').innerHTML = '✅ Completado';
                document.getElementById('status-1').className = 'status-pill status-completed';
                document.getElementById('manual-btn-1').style.display = 'none';
            }
            if (v1Done && !v2Done) {
                document.getElementById('status-2').innerHTML = '▶ En progreso';
                document.getElementById('status-2').className = 'status-pill status-active';
                document.getElementById('manual-btn-2').style.display = 'block';
            }
            if (v2Done) {
                document.getElementById('status-2').innerHTML = '✅ Completado';
                document.getElementById('status-2').className = 'status-pill status-completed';
                document.getElementById('manual-btn-2').style.display = 'none';
            }
            if (v2Done && !v3Done) {
                document.getElementById('status-3').innerHTML = '▶ En progreso';
                document.getElementById('status-3').className = 'status-pill status-active';
                document.getElementById('manual-btn-3').style.display = 'block';
            }
            if (v3Done) {
                document.getElementById('status-3').innerHTML = '✅ Completado';
                document.getElementById('status-3').className = 'status-pill status-completed';
                document.getElementById('manual-btn-3').style.display = 'none';
            }
        }

        // Global function for the fallback links
        window.manualComplete = function(num) {
            completeVideo(num);
        };

        // On Load initialization of UI
        window.addEventListener('DOMContentLoaded', () => {
            updateUI();
            if(v3Done) showFinalButton();
        });
    </script>
</body>
</html>
